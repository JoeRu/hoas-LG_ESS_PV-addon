name: PV Sync
version: "1.0.0"
slug: pv_sync
description: Syncs PV system data to MariaDB and publishes sensors directly to Home Assistant
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
homeassistant_api: true
hassio_api: true
map:
  - data
options:
  pv_host: "192.168.176.17"
  pv_user: "root"
  interval: 15
  db_user: "pvsync"
  db_password: ""
  db_name: "dbfiles"
schema:
  pv_host: str
  pv_user: str
  interval: "int(1,60)"
  db_user: str
  db_password: password
  db_name: str
